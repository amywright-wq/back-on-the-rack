<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post 1 – Launch</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #2a1a0e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Jost', sans-serif; }

  .card {
    width: 540px;
    aspect-ratio: 1;
    background: #F9F3EE;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 44px;
  }

  /* Decorative arch background */
  .arch {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 360px;
    height: 380px;
    background: #7B4A2D;
    border-radius: 0 0 180px 180px;
    z-index: 0;
  }

  /* Corner botanical lines */
  .corner-tl, .corner-br {
    position: absolute;
    width: 90px;
    height: 90px;
    z-index: 1;
  }
  .corner-tl { top: 12px; left: 12px; border-top: 2px solid #D4A97A; border-left: 2px solid #D4A97A; }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 2px solid #D4A97A; border-right: 2px solid #D4A97A; }

  /* Dot accent */
  .dot-row {
    position: absolute;
    bottom: 36px;
    left: 44px;
    display: flex;
    gap: 6px;
    z-index: 2;
  }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #D4A97A; }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #D4A97A;
    margin-bottom: 10px;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 600;
    color: #F9F3EE;
    line-height: 1;
    letter-spacing: .02em;
  }

  .brand-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: rgba(249,243,238,0.7);
    letter-spacing: .08em;
    margin-top: 4px;
    margin-bottom: 28px;
  }

  .divider-line {
    width: 48px;
    height: 1px;
    background: #D4A97A;
    margin: 0 auto 24px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: #3B2A1A;
    line-height: 1.2;
    margin-bottom: 14px;
    max-width: 360px;
  }

  .body-text {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: #5A3C1E;
    line-height: 1.7;
    max-width: 340px;
    margin-bottom: 28px;
  }

  .cta-pill {
    background: #7B4A2D;
    color: #F9F3EE;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .15em;
    text-transform: uppercase;
    padding: 10px 28px;
    border-radius: 30px;
    margin-bottom: 20px;
  }

  .handle {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: .12em;
    color: #9A6840;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">
  <div class="arch"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="content">
    <div class="eyebrow">Now live</div>
    <div class="brand">Back on<br>the Rack</div>
    <div class="brand-sub">at Workshop 26, Kimba</div>
    <div class="divider-line"></div>
    <div class="headline">Booking your rack<br>just got easier</div>
    <div class="body-text">Our brand new online form is live — list your preloved pieces, pick your drop-off date, and leave the rest to us.</div>
    <div class="cta-pill">Link in bio &rarr;</div>
    <div class="handle">@backontherackatw26</div>
  </div>

  <div class="dot-row">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>
</body>
</html>
